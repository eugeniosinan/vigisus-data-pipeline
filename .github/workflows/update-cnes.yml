name: Atualizar CNES Estabelecimentos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  update-cnes:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow

      - name: Process CNES
        run: |
          python gerar_cnes.py

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/publish
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update CNES estabelecimentos"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Discord
        if: steps.commit.outputs.changed == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret not configured. Skipping notification."
            exit 0
          fi

          COMPETENCIA=$(python -c "import json; print(json.load(open('data/publish/referencias/cnes/estabelecimentos/manifest.json', encoding='utf-8'))['version'])")
          FILES_COUNT=$(python -c "import json; print(len(json.load(open('data/publish/referencias/cnes/estabelecimentos/manifest.json', encoding='utf-8'))['files']))")
          WORKFLOW_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          export COMPETENCIA FILES_COUNT WORKFLOW_URL

          python -c "import json, os; print(json.dumps({'content': f\"✅ **CNES estabelecimentos atualizado**\\n📅 Competência: `{os.environ['COMPETENCIA']}`\\n🗂️ Arquivos por UF: `{os.environ['FILES_COUNT']}`\\n🔎 Workflow: {os.environ['WORKFLOW_URL']}\"}, ensure_ascii=False))" > discord-payload.json

          curl -sS \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "$DISCORD_WEBHOOK_URL"
