name: Atualizar CNES Estabelecimentos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  update-cnes:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow

      - name: Process CNES
        run: |
          python scripts/download_cnes_estabelecimentos.py
          python scripts/publish_latest_cnes_estabelecimentos.py

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github/cnes/estabelecimentos
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update CNES estabelecimentos"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHANGED: ${{ steps.commit.outputs.changed }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret not configured. Skipping notification."
            exit 0
          fi

          COMPETENCIA=$(python -c "import json; print(json.load(open('data/github/cnes/estabelecimentos/manifest.json', encoding='utf-8'))['competencia'])")
          FILES_COUNT=$(python -c "import json; print(json.load(open('data/github/cnes/estabelecimentos/manifest.json', encoding='utf-8'))['files_count'])")
          WORKFLOW_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          export COMPETENCIA FILES_COUNT WORKFLOW_URL CHANGED

          python -c "import json, os; status = 'com alteracao publicada' if os.environ['CHANGED'] == 'true' else 'teste sem alteracao publicada'; print(json.dumps({'content': f\"CNES estabelecimentos: {status}.\\nCompetencia: {os.environ['COMPETENCIA']}\\nArquivos por UF: {os.environ['FILES_COUNT']}\\nWorkflow: {os.environ['WORKFLOW_URL']}\"}, ensure_ascii=False))" > discord-payload.json

          curl -sS \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "$DISCORD_WEBHOOK_URL"
